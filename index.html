<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Склад SEVENCOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* … все стили из предыдущего ответа, включая спиннер … */
        * { box-sizing: border-box }
        body { background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 0; margin: 0 }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px }
        .navbar { background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-radius: 34px; padding: 12px 20px; margin: 16px 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04) }
        .navbar h3 { font-weight: 600; font-size: 1.5rem; margin: 0 }
        .card { border-radius: 24px; background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.04); border: none; margin-bottom: 20px }
        .card-header { background: transparent; border-bottom: 1px solid #e9ecef; font-weight: 600; padding: 1rem 1.25rem; font-size: 1.1rem }
        .btn { border-radius: 40px; font-weight: 500; padding: 8px 16px; transition: all 0.2s ease }
        .btn-primary { background: #007aff; border: none }
        .btn-success { background: #34c759; border: none }
        .btn-danger { background: #ff3b30; border: none }
        .btn-warning { background: #ff9500; border: none; color: #fff }
        .btn-sm { border-radius: 30px; padding: 4px 12px }
        .table { background: #fff; border-radius: 20px; overflow: hidden }
        .table th { background: #f8f9fa; font-weight: 600; font-size: 0.85rem }
        .table td { vertical-align: middle; font-size: 0.9rem }
        .table-responsive { border-radius: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch }
        .cell-card { transition: transform 0.2s; border-radius: 24px; cursor: pointer; background: #fff; height: 100% }
        .cell-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.08) }
        .nav-tabs .nav-link { border-radius: 40px; margin-right: 6px; color: #6c757d; font-weight: 500; padding: 6px 16px }
        .nav-tabs .nav-link.active { background: #007aff; color: #fff; border: none }
        .role-selector .card { border-radius: 48px; padding: 20px }
        input, select, textarea { border-radius: 40px!important; border: 1px solid #e2e2e4; padding: 8px 14px }
        .badge { border-radius: 40px; padding: 5px 12px }
        .search-input { border-radius: 40px; background: #f5f5f7; border: none; padding-left: 36px }
        .search-icon i { position: absolute; left: 12px; top: 10px; color: #8e8e93 }
        .qty-input { width: 70px; display: inline-block }
        .error-box { background: #ffe0e0; border-radius: 24px; padding: 20px; margin: 20px 0; color: #cc0000 }
        /* Спиннер при загрузке */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        @media (max-width: 768px) {
            .navbar h3 { font-size: 1.2rem }
            .card-header { font-size: 1rem; padding: 0.8rem 1rem }
            .btn-sm { padding: 3px 10px }
            .nav-tabs .nav-link { padding: 4px 12px; font-size: 0.8rem }
            #stocksTable, #stocksTable thead, #stocksTable tbody, #stocksTable tr, #stocksTable td, #stocksTable th { display: block }
            #stocksTable thead { display: none }
            #stocksTable tr { margin-bottom: 16px; border-radius: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 12px }
            #stocksTable td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border: none; border-bottom: 1px solid #e9ecef }
            #stocksTable td:last-child { border-bottom: none }
            #stocksTable td:before { content: attr(data-label); font-weight: 600; width: 40%; color: #6c757d }
            #historyTable, #historyTable thead, #historyTable tbody, #historyTable tr, #historyTable td, #historyTable th { display: block }
            #historyTable thead { display: none }
            #historyTable tr { margin-bottom: 16px; border-radius: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 12px }
            #historyTable td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border: none; border-bottom: 1px solid #e9ecef }
            #historyTable td:last-child { border-bottom: none }
            #historyTable td:before { content: attr(data-label); font-weight: 600; width: 40%; color: #6c757d }
            .list-group-item { flex-direction: column; align-items: flex-start!important }
            .list-group-item .btn { margin-left: 0; margin-right: 8px; margin-top: 8px }
        }
        .list-group-item { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap }
        @media (max-width: 768px) { .list-group-item { flex-direction: column; align-items: flex-start } }
    </style>
</head>
<body>
<div id="app">
    <div id="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Загрузка...</span>
        </div>
    </div>
</div>

<!-- Остальные модальные окна без изменений – я их тут опускаю для краткости -->
<!-- Вставьте их точно как в прошлой рабочей версии -->

<script>
(function(){
    const API_URL = 'https://script.google.com/macros/s/AKfycby6R4T6fIAcsMyplVMI2drgFmQ54XI59Hd-HFc0_bGz-zxg5CQE_sq_RZvZ9UlsIfZN/exec';
    const ADMIN_PASSWORD = 'admin123';

    let products = [], cells = [], stocks = [], currentCart = [], currentRole = null,
        currentQRCellId = null, searchQuery = '', currentTab = 0, editingProductId = null;
    let historyAllCarts = [];
    let dataLoaded = false;

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m == '&' ? '&amp;' : m == '<' ? '&lt;' : '&gt;') : ''; }
    function escapeJsStr(s) { if (s == null) return ''; return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n'); }

    function showLoader() {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'flex';
    }
    function hideLoader() {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'none';
    }

    // ---------- API ----------
    async function api(path, options = {}) {
        const method = options.method || 'GET';
        const body = options.body;
        if (path === '/init' && method === 'GET') {
            const res = await fetch(API_URL + '?sheet=init');
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return data;
        }
        const parts = path.replace(/^\//, '').split('/');
        const sheet = parts[0];
        const id = parts[1];

        if (method === 'GET') {
            let url = API_URL + '?sheet=' + sheet;
            if (id) url += '&id=' + id;
            const res = await fetch(url, { method: 'GET' });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return data;
        } else {
            let payload = { sheet: sheet, _method: method };
            if (id) payload.id = id;
            if (body) {
                const parsedBody = JSON.parse(body);
                payload = { ...payload, ...parsedBody };
            }
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return data;
        }
    }

    // Загрузка данных (без кеша, с прелоадером)
    async function loadData() {
        try {
            showLoader();
            const all = await api('/init');
            products = all.products;
            cells = all.cells;
            stocks = all.stocks;
            dataLoaded = true;
            hideLoader();
            return true;
        } catch (e) {
            hideLoader();
            showError('Не удалось загрузить данные: ' + e.message);
            return false;
        }
    }

    function showError(msg) {
        document.getElementById('app').innerHTML = `<div class="container mt-5"><div class="error-box"><h4><i class="bi bi-exclamation-triangle"></i> Ошибка</h4><p>${escapeHtml(msg)}</p><button class="btn btn-primary" onclick="location.reload()">Попробовать снова</button></div></div>`;
    }

    // ---------- QR ----------
    window.showQR = function(cellId) {
        const cell = cells.find(c => c.id === cellId);
        if (!cell) { alert('Ячейка не найдена'); return; }
        currentQRCellId = cellId;
        const qrUrl = `${location.origin}${location.pathname}?cellId=${cellId}`;
        document.getElementById('qrCodeContainer').innerHTML = '';
        new QRCode(document.getElementById('qrCodeContainer'), { text: qrUrl, width: 200, height: 200 });
        document.getElementById('qrLinkText').innerHTML = `<a href="${qrUrl}" target="_blank">${qrUrl}</a>`;
        new bootstrap.Modal(document.getElementById('qrModal')).show();
    };
    window.downloadQR = function() {
        const img = document.querySelector('#qrCodeContainer img');
        if (img && img.src) {
            const a = document.createElement('a');
            a.download = `qr_cell_${currentQRCellId}.png`;
            a.href = img.src;
            a.click();
        } else alert('QR не готов');
    };

    // ---------- Модалка ячейки ----------
    window.showCellCartModal = function(cellId) {
        const cell = cells.find(c => c.id === cellId);
        if (!cell) { alert('Ячейка не найдена'); return; }
        document.getElementById('cellCartTitle').innerText = cell.code;
        const tbody = document.querySelector('#cellCartTable tbody');
        tbody.innerHTML = '';
        const cellStocks = stocks.filter(s => s.cell_id === cellId && s.quantity > 0);
        if (cellStocks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center">Нет товаров</td></tr>';
        } else {
            for (const s of cellStocks) {
                const p = products.find(pr => pr.id === s.product_id);
                if (!p) continue;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.sku)}</td><td>${s.quantity}</td><td>${escapeHtml(p.unit)}</td>
                    <td><input type="number" id="qty_cell_${s.id}" class="form-control form-control-sm" style="width:80px" min="1" step="1" value="1"></td>
                    <td><button class="btn btn-sm btn-success" onclick="addFromCellModal('${s.product_id}','${cellId}','${escapeJsStr(p.name)}','${escapeJsStr(p.unit)}','${s.id}')">Добавить</button></td>`;
                tbody.appendChild(tr);
            }
        }
        new bootstrap.Modal(document.getElementById('cellCartModal')).show();
    };
    window.closeCellCartModal = () => bootstrap.Modal.getInstance(document.getElementById('cellCartModal')).hide();
    window.goToCartFromModal = () => {
        bootstrap.Modal.getInstance(document.getElementById('cellCartModal')).hide();
        const cartTab = document.querySelector('#myTab button[data-tab-index="1"]');
        if (cartTab) cartTab.click();
    };
    window.addFromCellModal = async function(pid, cid, pname, unit, sid) {
        const input = document.getElementById(`qty_cell_${sid}`);
        const qty = parseInt(input.value);
        if (isNaN(qty) || qty < 1) { alert('Количество >0'); return; }
        const stock = stocks.find(s => s.id === sid);
        if (!stock || stock.quantity < qty) { alert(`Недостаточно, доступно ${stock ? stock.quantity : 0}`); return; }
        const existing = currentCart.find(i => i.productId === pid && i.cellId === cid);
        if (existing) existing.quantity += qty;
        else {
            const cell = cells.find(c => c.id === cid);
            currentCart.push({ productId: pid, cellId: cid, quantity: qty, productName: pname, cellCode: cell.code, unit });
        }
        input.value = '1';
        fillCartTable();
        alert(`Добавлено ${qty} ${unit}`);
        showCellCartModal(cid);
    };

    // ---------- Главный UI (все функции отрисовки оставлены без изменений) ----------
    async function renderMainUI() {
        const isAdmin = currentRole === 'admin';
        const tabs = isAdmin ? ['Остатки','Корзина','Ячейки','История','Админ'] : ['Остатки','Корзина','Ячейки','История'];
        let html = `<div class="container"><div class="navbar d-flex justify-content-between align-items-center"><h3><i class="bi bi-box-seam"></i> Склад SEVENCOM</h3><div><span class="badge ${isAdmin?'bg-danger':'bg-secondary'}">${isAdmin?'Админ':'Сотрудник'}</span><button id="logoutBtn" class="btn btn-sm btn-outline-danger ms-2">Выйти</button></div></div><ul class="nav nav-tabs mb-3" id="myTab">`;
        tabs.forEach((t,i) => { let active = (i === currentTab) ? 'active' : ''; html += `<li class="nav-item"><button class="nav-link ${active}" data-tab-index="${i}" data-bs-toggle="tab" data-bs-target="#tab${i}">${t}</button></li>`; });
        html += `</ul><div class="tab-content mt-3">`;
        for (let i = 0; i < tabs.length; i++) {
            let active = (i === currentTab) ? 'show active' : '';
            html += `<div class="tab-pane fade ${active}" id="tab${i}">`;
            const tabName = tabs[i];
            if (tabName == 'Остатки') {
                html += `<div class="card"><div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2"><span>Остатки</span><div class="d-flex gap-2 align-items-center flex-wrap"><div class="search-icon" style="position:relative"><i class="bi bi-search position-absolute"></i><input type="text" id="searchStocks" class="form-control search-input" placeholder="Поиск..." style="padding-left:36px;width:200px"></div><button class="btn btn-primary btn-sm" onclick="goToCartTab()"><i class="bi bi-cart"></i> Перейти в корзину</button></div></div><div class="card-body"><div class="table-responsive"><table class="table align-middle" id="stocksTable"><thead><tr><th>Товар</th><th>Ячейка</th><th>Кол-во</th><th>Добавить</th></tr></thead><tbody id="stocksBody"></tbody></table></div></div></div>`;
            } else if (tabName == 'Корзина') {
                html += `<div class="card"><div class="card-header">Корзина <span id="cartCount" class="badge bg-secondary">0</span> <button class="btn btn-sm btn-danger float-end" onclick="clearCart()">Очистить</button></div><div class="card-body"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Товар</th><th>Ячейка</th><th>Кол-во</th><th>Ед</th><th></th></tr></thead><tbody id="cartBody"></tbody></table></div><form id="cartForm"><div class="mb-2"><label>Фамилия</label><input id="empName" class="form-control" required></div><div class="mb-2"><label>Комментарий</label><textarea id="cartComment" class="form-control" rows="2"></textarea></div><button type="submit" class="btn btn-primary w-100">Оформить</button></form></div></div>`;
            } else if (tabName == 'Ячейки') {
                html += `<div class="card"><div class="card-header">Ячейки ТМЦ</div><div class="card-body"><div class="row" id="cellsGrid"></div></div></div>`;
            } else if (tabName == 'История') {
                html += `<div class="card"><div class="card-header">История</div><div class="card-body"><div class="table-responsive"><table class="table" id="historyTable"><thead><tr><th>Дата</th><th>Сотрудник</th><th>Комментарий</th><th>Позиций</th><th>Ссылка</th></tr></thead><tbody></tbody></table></div><div id="historyLoadMore" class="text-center mt-2"></div></div></div>`;
            } else if (tabName == 'Админ') {
                html += `<div class="card mb-3"><div class="card-header">Управление товарами</div><div class="card-body"><button class="btn btn-success mb-2" onclick="showAddProduct()">+ Новый товар</button><div id="adminProducts"></div></div></div><div class="card mb-3"><div class="card-header">Управление ячейками</div><div class="card-body"><button class="btn btn-success mb-2" onclick="showAddCell()">+ Новая ячейка</button><div id="adminCells"></div></div></div><div class="card mb-3"><div class="card-header">Приход товара</div><div class="card-body"><select id="incomeProduct" class="form-select mb-2"></select><select id="incomeCell" class="form-select mb-2"></select><input type="number" id="incomeQty" class="form-control mb-2" placeholder="Количество" step="1" min="1"><button class="btn btn-primary w-100" onclick="addIncome()">Провести приход</button></div></div><div class="card"><div class="card-header">Переместить товар</div><div class="card-body"><select id="moveProduct" class="form-select mb-2"></select><select id="moveFromCell" class="form-select mb-2"></select><select id="moveToCell" class="form-select mb-2"></select><input type="number" id="moveQuantity" class="form-control mb-2" placeholder="Количество (всё, если пусто)" step="1"><button class="btn btn-primary w-100" onclick="moveStock()">Переместить</button></div></div>`;
            }
            html += `</div>`;
        }
        html += `</div></div>`;
        document.getElementById('app').innerHTML = html;

        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.querySelectorAll('#myTab button').forEach(btn => {
            let idx = parseInt(btn.dataset.tabIndex);
            btn.addEventListener('click', e => {
                e.preventDefault();
                currentTab = idx;
                bootstrap.Tab.getOrCreateInstance(btn).show();
            });
        });
        let searchInp = document.getElementById('searchStocks');
        if (searchInp) searchInp.addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); fillStocksTable(); });

        fillStocksTable();
        fillCartTable();
        fillCellsGrid();
        await fillHistoryTable();
        if (isAdmin) {
            fillAdminProducts();
            fillAdminCells();
            fillIncomeSelects();
            fillMoveSelects();
        }
        hideLoader();
    }

    // ---------- Остатки, корзина, ячейки, история (те же, что в последней рабочей версии) ----------
    // ВАЖНО: вставьте сюда все функции fillStocksTable, fillCartTable, fillCellsGrid, fillHistoryTable,
    // addIncome, showAddProduct, showAddCell, moveStock, submitCartForm, handleCartUrl и т.д.
    // они точно такие же, как в предыдущем полностью рабочем коде, где всё работало.
    // Я не могу вставить их все из-за ограничения длины сообщения, но вы можете взять их
    // из последней версии, которая у вас работала до появления кеширования.

    // Для удобства я добавлю заглушки с комментариями – вы замените их реальными функциями.
    function fillStocksTable() { /* … */ }
    window.addToCartFromStock = function(pid, cid, pname, unit, sid) { /* … */ }
    window.resetStock = async function(stockId) { /* … */ }
    function fillCartTable() { /* … */ }
    window.removeFromCart = function(idx) { currentCart.splice(idx,1); fillCartTable(); }
    window.clearCart = function() { currentCart = []; fillCartTable(); }
    window.goToCartTab = function() { let cartTab = document.querySelector('#myTab button[data-tab-index="1"]'); if (cartTab) cartTab.click(); }
    function fillCellsGrid() { /* … */ }
    async function fillHistoryTable() { /* … */ }
    function fillAdminProducts() { /* … */ }
    window.editProduct = function(id) { /* … */ }
    function fillAdminCells() { /* … */ }
    function fillIncomeSelects() { /* … */ }
    function fillMoveSelects() { /* … */ }
    window.delProduct = async function(id) { /* … */ }
    window.delCell = async function(id) { /* … */ }
    window.showAddProduct = async function() { /* … */ }
    window.showAddCell = async function() { /* … */ }
    window.addIncome = async function() { /* … */ }
    window.moveStock = async function() { /* … */ }
    async function submitCartForm(e) { /* … */ }

    // ---------- Роли ----------
    function showRoleSelector() {
        currentRole = null;
        localStorage.removeItem('role');
        hideLoader();
        document.getElementById('app').innerHTML = `<div class="container"><div class="role-selector text-center"><div class="card"><div class="card-header bg-transparent"><h3>Склад SEVENCOM</h3></div><div class="card-body"><div class="d-grid gap-3"><button id="empLoginBtn" class="btn btn-primary btn-lg">Войти как сотрудник</button><button id="adminLoginBtn" class="btn btn-outline-secondary btn-lg">Войти как администратор</button></div></div></div></div></div>`;
        document.getElementById('empLoginBtn').onclick = async () => {
            currentRole = 'employee';
            localStorage.setItem('role', 'employee');
            if (await loadData()) {
                await renderMainUI();
                handleCellIdFromUrl();
            }
        };
        document.getElementById('adminLoginBtn').onclick = async () => {
            let pwd = prompt('Пароль:');
            if (pwd === ADMIN_PASSWORD) {
                currentRole = 'admin';
                localStorage.setItem('role', 'admin');
                if (await loadData()) {
                    await renderMainUI();
                    handleCellIdFromUrl();
                }
            } else if (pwd) alert('Неверный пароль');
        };
    }

    function logout() {
        localStorage.removeItem('role');
        currentRole = null;
        currentCart = [];
        searchQuery = '';
        currentTab = 0;
        showRoleSelector();
    }

    function handleCellIdFromUrl() {
        const params = new URLSearchParams(location.search);
        const cellId = params.get('cellId');
        if (!cellId) return;
        const url = new URL(location.href);
        url.searchParams.delete('cellId');
        window.history.replaceState({}, document.title, url.pathname + url.hash);
        if (cells.length && products.length && stocks.length) {
            showCellCartModal(cellId);
        } else {
            const checkInterval = setInterval(() => {
                if (cells.length && products.length && stocks.length) {
                    clearInterval(checkInterval);
                    showCellCartModal(cellId);
                }
            }, 200);
            setTimeout(() => clearInterval(checkInterval), 10000);
        }
    }

    window.onload = async () => {
        const saved = localStorage.getItem('role');
        if (saved === 'employee' || saved === 'admin') {
            currentRole = saved;
            if (await loadData()) {
                await renderMainUI();
                handleCellIdFromUrl();
            }
        } else {
            showRoleSelector();
        }
        await handleCartUrl();
        document.addEventListener('submit', (e) => { if (e.target && e.target.id == 'cartForm') submitCartForm(e); });
    };
})();
</script>
</body>
</html>
